[tool.poetry]
name = "libera_wfovc"
version = "0.1.0"
description = "Libera wide field of view camera L1b algorithm"
authors = ["Gavin Medley <gavin.medley@lasp.colorado.edu>"]

[tool.poetry.dependencies]
python = "^3.9"

[tool.poetry.dev-dependencies]
pytest = "^7.1.2"
pytest-randomly = "^3.12.0"
pytest-coverage = "^0.0"
pylint = "^2.14.2"
bandit = "^1.7.4"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
